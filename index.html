<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toilet Flyer - The Poop Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: none;
        }

        body {
            font-family: Arial, sans-serif;
            background: #000;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            background: transparent;
            border-radius: 0;
            box-shadow: none;
            padding: 0;
        }

        #game canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        h1, .info {
            display: none;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <h1>🚽 Toilet Flyer 💩</h1>
        <div class="info">Press SPACEBAR to launch and fly!</div>
        <div id="game"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.js"></script>
    <script src="game.js"></script>
</body>
</html>
